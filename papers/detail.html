<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>論文詳細 | R.Goto</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <a href="../index.html" class="nav-logo">R.Goto</a>
            <ul class="nav-menu" id="nav-menu">
                <li><a href="../index.html">Home</a></li>
                <li class="nav-dropdown">
                    <a href="#" class="nav-dropdown-toggle active">Study <i class="fas fa-chevron-down"></i></a>
                    <ul class="nav-dropdown-menu">
                        <li><a href="../statistics/index.html"><i class="fas fa-chart-bar"></i> 統計学ノート</a></li>
                        <li><a href="index.html" class="active"><i class="fas fa-file-alt"></i> 論文まとめ</a></li>
                    </ul>
                </li>
                <li class="nav-dropdown">
                    <a href="#" class="nav-dropdown-toggle">Application <i class="fas fa-chevron-down"></i></a>
                    <ul class="nav-dropdown-menu">
                        <li><a href="../Typing/index.html"><i class="fas fa-keyboard"></i> タイピング道場</a></li>
                        <li><a href="../boardgames/index.html"><i class="fas fa-chess-board"></i> ボードゲーム</a></li>
                    </ul>
                </li>
            </ul>
            <button class="nav-toggle" id="nav-toggle" aria-label="メニュー">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </nav>

    <!-- ヒーローセクション（JSで内容を注入） -->
    <header class="detail-hero" id="detail-hero">
        <div class="container" id="detail-hero-content">
            <!-- JSで生成 -->
        </div>
    </header>

    <!-- メインコンテンツ（JSで内容を注入） -->
    <main class="detail-main">
        <div class="container">
            <div class="detail-grid" id="detail-grid">
                <!-- JSで生成 -->
            </div>
        </div>
    </main>

    <footer class="papers-footer">
        <div class="container">
            <p>&copy; 2026 R.Goto - 論文まとめ</p>
        </div>
    </footer>

    <script src="data.js"></script>
    <script src="explanations.js"></script>
    <script>
    (function () {
        // ===== ナビゲーション =====
        const toggle = document.getElementById('nav-toggle');
        const menu = document.getElementById('nav-menu');
        if (toggle) {
            toggle.addEventListener('click', () => menu.classList.toggle('open'));
        }
        window.addEventListener('scroll', () => {
            document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 10);
        });

        // ===== URLパラメータからID取得 =====
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        const paper = papersData.find(p => p.id === id);

        if (!paper) {
            // 見つからない場合は一覧へリダイレクト
            window.location.href = 'index.html';
            return;
        }

        // ===== ページタイトル更新 =====
        document.title = paper.title + ' | R.Goto';

        // ===== エスケープ =====
        function esc(str) {
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        // ===== 段落配列 → <p>タグ列 =====
        function toParas(arr) {
            if (!Array.isArray(arr) || arr.length === 0) return '';
            return arr.map(p => `<p class="expl-para">${esc(p)}</p>`).join('');
        }

        // ===== 外部リンク生成 =====
        function buildLinks(links) {
            if (!links) return '';
            let html = '';
            if (links.arxiv) {
                html += `<a href="${links.arxiv}" target="_blank" rel="noopener noreferrer" class="detail-link primary">
                    <i class="fas fa-file-pdf"></i> arXiv
                </a>`;
            }
            if (links.github) {
                html += `<a href="${links.github}" target="_blank" rel="noopener noreferrer" class="detail-link">
                    <i class="fab fa-github"></i> GitHub
                </a>`;
            }
            return html;
        }

        // ===== ヒーロー描画 =====
        document.getElementById('detail-hero-content').innerHTML = `
            <div class="detail-breadcrumb">
                <a href="index.html"><i class="fas fa-home"></i> 論文まとめ</a>
                <i class="fas fa-chevron-right"></i>
                <span>詳細</span>
            </div>
            <div class="detail-meta">
                <span class="detail-year"><i class="fas fa-calendar-alt"></i> ${esc(String(paper.year))}</span>
                ${paper.venue ? `<span class="detail-venue-badge"><i class="fas fa-university"></i> ${esc(paper.venue)}</span>` : ''}
            </div>
            <h1 class="detail-title">${esc(paper.title)}</h1>
            ${paper.titleJa ? `<p class="detail-title-ja">${esc(paper.titleJa)}</p>` : ''}
            <p class="detail-authors">${esc(paper.authors)}</p>
            <div class="detail-tags">
                ${paper.tags.map(t => `<span class="detail-tag">${esc(t)}</span>`).join('')}
            </div>
            <div class="detail-links">
                ${buildLinks(paper.links)}
                <a href="index.html" class="detail-link">
                    <i class="fas fa-arrow-left"></i> 一覧に戻る
                </a>
            </div>
        `;

        // ===== メインコンテンツ描画 =====
        const summaryHtml = `
            <section class="detail-section">
                <div class="detail-section-header">
                    <div class="detail-section-icon icon-bg">
                        <i class="fas fa-align-left"></i>
                    </div>
                    <h2>要約</h2>
                </div>
                <p>${esc(paper.summary)}</p>
            </section>
        `;

        const expl = (typeof papersExplanations !== 'undefined' && papersExplanations[id]) ? papersExplanations[id] : [];
        const explanationHtml = expl.length ? `
            <section class="detail-section detail-section-expl">
                <div class="detail-section-header">
                    <div class="detail-section-icon icon-expl">
                        <i class="fas fa-lightbulb"></i>
                    </div>
                    <h2>わかりやすく解説</h2>
                </div>
                <div class="expl-body">${toParas(expl)}</div>
            </section>
        ` : '';

        const sidebarHtml = `
            <div class="sidebar-card">
                <h3>基本情報</h3>
                <div class="sidebar-info-row">
                    <span class="label">公開年</span>
                    <span class="value">${esc(String(paper.year))}</span>
                </div>
                ${paper.venue ? `
                <div class="sidebar-info-row">
                    <span class="label">掲載先</span>
                    <span class="value">${esc(paper.venue)}</span>
                </div>` : ''}
                <div class="sidebar-info-row">
                    <span class="label">著者</span>
                    <span class="value">${esc(paper.authors)}</span>
                </div>
            </div>
            <div class="sidebar-card">
                <h3>タグ</h3>
                <div style="display:flex;flex-wrap:wrap;gap:6px;">
                    ${paper.tags.map(t => `<span class="detail-tag">${esc(t)}</span>`).join('')}
                </div>
            </div>
            ${paper.links && (paper.links.arxiv || paper.links.github) ? `
            <div class="sidebar-card">
                <h3>リンク</h3>
                <div style="display:flex;flex-direction:column;gap:8px;">
                    ${paper.links.arxiv ? `<a href="${paper.links.arxiv}" target="_blank" rel="noopener noreferrer" class="detail-link primary" style="justify-content:center;"><i class="fas fa-file-pdf"></i> arXiv</a>` : ''}
                    ${paper.links.github ? `<a href="${paper.links.github}" target="_blank" rel="noopener noreferrer" class="detail-link" style="justify-content:center;"><i class="fab fa-github"></i> GitHub</a>` : ''}
                </div>
            </div>` : ''}
            <a href="index.html" class="back-btn">
                <i class="fas fa-arrow-left"></i> 一覧に戻る
            </a>
        `;

        document.getElementById('detail-grid').innerHTML = `
            <div class="detail-sections">${summaryHtml}${explanationHtml}</div>
            <aside class="detail-sidebar">${sidebarHtml}</aside>
        `;
    })();
    </script>
</body>
</html>
